apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-facing
  namespace: purchase-system
  labels:
    app: customer-facing
    assignment-id: e271b052-9200-4502-b491-62f1649c07
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-facing
  template:
    metadata:
      labels:
        app: customer-facing
        assignment-id: e271b052-9200-4502-b491-62f1649c07
    spec:
      containers:
        - name: customer-facing
          image: customer-facing:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: KAFKA_BROKER
              value: "kafka:9092"
            - name: CUSTOMER_MANAGEMENT_URL
              value: "http://customer-management:3001"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: customer-facing
  namespace: purchase-system
  labels:
    app: customer-facing
    assignment-id: e271b052-9200-4502-b491-62f1649c07
spec:
  selector:
    app: customer-facing
  ports:
    - port: 3000
      targetPort: 3000
# maintainer: automated-checking
