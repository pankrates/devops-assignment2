apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: purchase-system
  labels:
    assignment-id: e271b052-9200-4502-b491-62f1649c07
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: purchase-system
  labels:
    app: mongodb
    assignment-id: e271b052-9200-4502-b491-62f1649c07
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
        assignment-id: e271b052-9200-4502-b491-62f1649c07
    spec:
      containers:
        - name: mongodb
          image: mongo:6
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongodb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: purchase-system
  labels:
    app: mongodb
    assignment-id: e271b052-9200-4502-b491-62f1649c07
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
# maintainer: automated-checking
