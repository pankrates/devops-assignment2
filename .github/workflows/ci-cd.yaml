name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [customer-facing, customer-management, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          load: true
          tags: ${{ matrix.service }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test - container starts
        run: |
          docker run -d --name test-${{ matrix.service }} ${{ matrix.service }}:test
          sleep 3
          docker ps | grep test-${{ matrix.service }}
          docker logs test-${{ matrix.service }}
          docker stop test-${{ matrix.service }}

  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Kubernetes manifests
        run: |
          for f in k8s/namespace.yaml k8s/mongodb.yaml k8s/kafka.yaml k8s/customer-facing.yaml k8s/customer-management.yaml k8s/frontend.yaml; do
            echo "Validating $f..."
            kubectl apply -f "$f" --dry-run=client
          done

  push:
    needs: [build-and-test, validate-manifests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [customer-facing, customer-management, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Update image tags in manifests
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|image: customer-facing:latest|image: ${{ env.IMAGE_PREFIX }}/customer-facing:${SHORT_SHA}|" k8s/customer-facing.yaml
          sed -i "s|image: customer-management:latest|image: ${{ env.IMAGE_PREFIX }}/customer-management:${SHORT_SHA}|" k8s/customer-management.yaml
          sed -i "s|image: frontend:latest|image: ${{ env.IMAGE_PREFIX }}/frontend:${SHORT_SHA}|" k8s/frontend.yaml
          echo "Updated manifests to use image tag: ${SHORT_SHA}"
          grep "image:" k8s/customer-facing.yaml k8s/customer-management.yaml k8s/frontend.yaml

      - name: Validate updated manifests
        run: |
          for f in k8s/namespace.yaml k8s/mongodb.yaml k8s/kafka.yaml k8s/customer-facing.yaml k8s/customer-management.yaml k8s/frontend.yaml; do
            kubectl apply -f "$f" --dry-run=client
          done
          echo "Manifests validated. To deploy to a cluster, configure kubeconfig and run: kubectl apply -f k8s/"
# maintainer: automated-checking
