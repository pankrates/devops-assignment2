<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase System</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { padding: 8px; width: 100%; box-sizing: border-box; }
    button { padding: 10px 20px; margin-right: 10px; margin-top: 10px; cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 4px; }
    button:hover { background: #0056b3; }
    #result { margin-top: 20px; padding: 15px; background: #f4f4f4; border-radius: 4px; white-space: pre-wrap; min-height: 50px; }
  </style>
</head>
<body>
  <h1>Purchase System</h1>

  <div class="form-group">
    <label for="username">Username</label>
    <input type="text" id="username" value="john_doe">
  </div>
  <div class="form-group">
    <label for="userid">User ID</label>
    <input type="text" id="userid" value="user123">
  </div>
  <div class="form-group">
    <label for="price">Price</label>
    <input type="number" id="price" value="29.99">
  </div>

  <button id="buyBtn" onclick="buy()">Buy</button>
  <button id="historyBtn" data-action-id="history-reconciliation" onclick="getAllUserBuys()">getAllUserBuys</button>

  <div id="result">Results will appear here...</div>

  <script>
    const API_URL = '/api';

    async function buy() {
      const username = document.getElementById('username').value;
      const userid = document.getElementById('userid').value;
      const price = parseFloat(document.getElementById('price').value);

      try {
        const res = await fetch(`${API_URL}/buy`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, userid, price })
        });
        const data = await res.json();
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById('result').textContent = 'Error: ' + err.message;
      }
    }

    async function getAllUserBuys() {
      const userid = document.getElementById('userid').value;
      try {
        const res = await fetch(`${API_URL}/getAllUserBuys/${userid}`);
        const data = await res.json();
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById('result').textContent = 'Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
