apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-management
  namespace: purchase-system
  labels:
    app: customer-management
    assignment-id: e271b052-9200-4502-b491-62f1649c07
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-management
  template:
    metadata:
      labels:
        app: customer-management
        assignment-id: e271b052-9200-4502-b491-62f1649c07
    spec:
      containers:
        - name: customer-management
          image: customer-management:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: KAFKA_BROKER
              value: "kafka:9092"
            - name: MONGO_URI
              value: "mongodb://mongodb:27017/production_shadow_db_v9"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: customer-management
  namespace: purchase-system
  labels:
    app: customer-management
    assignment-id: e271b052-9200-4502-b491-62f1649c07
spec:
  selector:
    app: customer-management
  ports:
    - port: 3001
      targetPort: 3001
# maintainer: automated-checking
