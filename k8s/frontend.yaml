apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: purchase-system
  labels:
    app: frontend
    assignment-id: e271b052-9200-4502-b491-62f1649c07
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        assignment-id: e271b052-9200-4502-b491-62f1649c07
    spec:
      containers:
        - name: frontend
          image: frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: purchase-system
  labels:
    app: frontend
    assignment-id: e271b052-9200-4502-b491-62f1649c07
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
